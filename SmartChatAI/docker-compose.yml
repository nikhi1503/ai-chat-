version: '3.8'

services:
  mongodb:
    image: mongo:5.0
    container_name: smartchat-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: smartchat-ai
    volumes:
      - mongodb-data:/data/db
    networks:
      - smartchat-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartchat-backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/smartchat-ai
      JWT_SECRET: your_jwt_secret_key
      NODE_ENV: production
      PORT: 5000
      FRONTEND_URL: http://localhost:3000
      AI_SERVICE_URL: http://ai-service:5001
    depends_on:
      - mongodb
    networks:
      - smartchat-network
    restart: unless-stopped

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: smartchat-ai
    ports:
      - "5001:5001"
    environment:
      FLASK_ENV: production
      PORT: 5001
    networks:
      - smartchat-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartchat-frontend
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    networks:
      - smartchat-network
    restart: unless-stopped

volumes:
  mongodb-data:

networks:
  smartchat-network:
    driver: bridge
